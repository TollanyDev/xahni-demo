<?xml version="1.0" encoding="UTF-8"?>
<!--
  XAHNI · Icon sprite (Epic A.2 · 2026-05-28)

  Convención de estilo:
    - viewBox 24x24 (excepto: x-icon-versus 18x16, x-icon-crown 16x14)
    - fill="none" stroke="currentColor" stroke-width="1.5"
    - stroke-linecap="round" stroke-linejoin="round"
    - El color se hereda via `color` CSS (use con currentColor)

  Uso markup (IMPORTANTE: explicit close tag, NO self-closing):
    <svg class="x-icon"><use href="#x-icon-tareas"></use></svg>

  Razón explicit close: HTML5 parser quirk con <use href="..."/> dentro
  de foreign content (SVG) cuando se inyecta vía innerHTML — el self-close
  malforma la DOM tree downstream, anidando elementos en SVG namespace
  donde div/article no renderean. Phase 4 fix Epic A.2.c 2026-05-28.

  Tamaños via class:
    .x-icon         — 14px default
    .x-icon--sm     — 12px
    .x-icon--md     — 16px (chip / button medio)
    .x-icon--lg     — 22px (identity card hero)
    .x-icon--xl     — 32px (empty state / hero stat)

  Reversibilidad: para volver a emoji en una vista específica, reemplazar
  el bloque <svg><use/></svg> por el emoji original. La fuente de verdad
  emoji ↔ symbol está en `docs/merges/2026-05-28-merge-rework-pre-c10-epic-a-2-...md`.
-->
