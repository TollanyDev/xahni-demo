<div class="page-header">
  <div class="page-title">Gestión de <em>Horarios</em></div>
  <div class="page-subtitle">Administra los horarios de clase del sistema</div>
</div>

<!-- Resumen de métricas -->
<div class="grid-4" style="margin-bottom:20px" id="horarios-resumen"></div>

<!-- Filtros y búsqueda -->
<div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
  <div class="topbar-search" style="width:240px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Buscar..."
           oninput="aplicarFiltroHorarios('busqueda',this.value)" />
  </div>
  <select id="horarios-filtro-institucion" class="form-select" style="width:220px"
          onchange="aplicarFiltroHorarios('institucion',this.value)">
    <option value="">Ninguno seleccionado</option>
  </select>
  <select id="horarios-filtro-grupo" class="form-select" style="width:200px"
          onchange="aplicarFiltroHorarios('grupo',this.value)" disabled>
    <option value="">Ninguno seleccionado</option>
  </select>
  <button class="x-btn x-btn--primary" style="padding:9px 16px;font-size:13px;margin-left:auto"
          onclick="abrirModalCrearHorario()">
    + Nuevo horario
  </button>
</div>

<!-- Calendario semanal -->
<div class="card" style="margin-bottom:20px">
  <div class="card-header">
    <span class="card-title">📅 Calendario Semanal</span>
  </div>
  <div id="calendario-semanal" style="overflow-x:auto"></div>
</div>

<!-- Tabla de horarios -->
<div class="card">
  <div class="card-header">
    <span class="card-title">📋 Lista de Horarios</span>
  </div>
  <div id="horarios-tabla"></div>
</div>
