<div class="page-header">
  <div class="page-title">Gestión de <em>Materias</em></div>
  <div class="page-subtitle" id="gestion-materias-sub">
    Administra el catálogo de materias del sistema
  </div>
</div>

<!-- Resumen de métricas -->
<div class="grid-4" style="margin-bottom: 20px" id="materias-admin-resumen"></div>

<!-- Filtros y búsqueda -->
<div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
  <div class="topbar-search" style="width: 240px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input id="buscar-materia-input" type="text" placeholder="Buscar materia..."
           oninput="filtrarMateriasBusqueda(this.value)" />
  </div>
  <select id="filtro-estado-materia" class="form-select" style="width: 180px"
          onchange="filtrarMateriasEstado(this.value)">
    <option value="todos">Todos los estados</option>
    <option value="activa" selected>Activas</option>
    <option value="archivada">Archivadas</option>
  </select>
  <select id="filtro-institucion-materia" class="form-select" style="width: 200px"
          onchange="filtrarMateriasInstitucion(this.value)">
    <option value="todas">Todas las instituciones</option>
    <!-- Opciones pobladas dinámicamente por _poblarSelectFiltroInstitucion()
         desde DEMO_INSTITUCIONES (4.F.bundle1). -->
  </select>
  <button class="x-btn x-btn--primary" style="padding: 9px 16px; font-size: 13px; margin-left: auto"
          onclick="_poblarSelectProfesorMateria('nueva-materia-profesor-id');_poblarSelectClasificacionMateria('nueva-materia-clasificacion');_poblarChecklistGruposMateria('nueva-materia-grupos',[]);openModal('modal-nueva-materia-admin')">
    + Nueva materia
  </button>
</div>

<!-- Tabla de materias -->
<div class="card">
  <table class="data-table">
    <thead>
      <tr>
        <th>Materia</th>
        <th>Profesor</th>
        <th>Créditos</th>
        <th>Horario</th>
        <th>Alumnos</th>
        <th>Institución</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="materias-admin-tbody"></tbody>
  </table>
</div>
