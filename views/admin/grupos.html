<div class="page-header">
  <div class="page-title">Gestión de <em>Grupos</em></div>
  <div class="page-subtitle" id="gestion-grupos-sub">
    Crea grupos, asigna materias y alumnos por periodo
  </div>
</div>

<!-- Resumen de métricas -->
<div class="grid-4" style="margin-bottom: 20px" id="grupos-resumen"></div>

<!-- Filtros y búsqueda -->
<div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
  <div class="topbar-search" style="width: 240px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input id="buscar-grupo-input" type="text" placeholder="Buscar grupo..."
           oninput="filtrarGruposBusqueda(this.value)" />
  </div>
  <select id="filtro-carrera-grupo" class="form-select" style="width: 220px"
          onchange="filtrarGruposCarrera(this.value)">
    <option value="todas">Todas las carreras</option>
  </select>
  <select id="filtro-estado-grupo" class="form-select" style="width: 180px"
          onchange="filtrarGruposEstado(this.value)">
    <option value="activos">Activos</option>
    <option value="archivados">Archivados</option>
    <option value="todos">Todos</option>
  </select>
  <button class="x-btn x-btn--primary" style="padding: 9px 16px; font-size: 13px; margin-left: auto"
          onclick="abrirNuevoGrupo()">
    + Nuevo grupo
  </button>
</div>

<!-- Tabla de grupos -->
<div class="card">
  <table class="data-table">
    <thead>
      <tr>
        <th>Grupo</th>
        <th>Carrera</th>
        <th>Periodo</th>
        <th>Materias</th>
        <th>Alumnos</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="grupos-tbody"></tbody>
  </table>
</div>
</body>
