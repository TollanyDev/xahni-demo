<div class="page-header">
  <div class="page-title">Gestión de <em>Instituciones</em></div>
  <div class="page-subtitle" id="gestion-instituciones-sub">
    Administra instituciones educativas del sistema
  </div>
</div>

<!-- Resumen de métricas -->
<div class="grid-4" style="margin-bottom: 20px" id="instituciones-resumen"></div>

<!-- Filtros y búsqueda -->
<div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
  <div class="topbar-search" style="width: 240px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input id="buscar-institucion-input" type="text" placeholder="Buscar institución..."
           oninput="filtrarInstitucionesBusqueda(this.value)" />
  </div>
  <!-- tipo/region pobladas dinámicamente desde DEMO_INSTITUCIONES por poblarFiltrosInstituciones() -->
  <select id="filtro-tipo-institucion" class="form-select" style="width: 160px"
          onchange="filtrarInstitucionesTipo(this.value)">
    <option value="todos">Todos los tipos</option>
  </select>
  <select id="filtro-region-institucion" class="form-select" style="width: 200px"
          onchange="filtrarInstitucionesRegion(this.value)">
    <option value="todas">Todas las regiones</option>
  </select>
  <!-- estado: enum semántico del dominio (Activa/Suspendida), no datos de usuario → opciones fijas. -->
  <select id="filtro-estado-institucion" class="form-select" style="width: 180px"
          onchange="filtrarInstitucionesEstado(this.value)">
    <option value="todos">Todos los estados</option>
    <option value="Activa">Activas</option>
    <option value="Suspendida">Suspendidas</option>
  </select>
  <button class="x-btn x-btn--primary" style="padding: 9px 16px; font-size: 13px; margin-left: auto"
          onclick="openModal('modal-nueva-institucion')">
    + Nueva institución
  </button>
</div>

<!-- Tabla de instituciones -->
<div class="card">
  <table class="data-table">
    <thead>
      <tr>
        <th>Institución</th>
        <th>Tipo</th>
        <th>Región</th>
        <th>Usuarios</th>
        <th>Recursos</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="instituciones-tbody"></tbody>
  </table>
</div>
